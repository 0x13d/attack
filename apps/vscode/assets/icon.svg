<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="0x13d::att&amp;ck">
  <!-- Original "white rabbit" stencil mark for 0x13d::att&ck — follow the white rabbit. -->
  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A465F"/>
      <stop offset="1" stop-color="#232B3E"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="128" height="128" rx="26" fill="url(#ink)"/>
  <g fill="#FFFFFF">
    <!-- ears -->
    <ellipse cx="51" cy="43" rx="8.5" ry="27" transform="rotate(-13 51 43)"/>
    <ellipse cx="77" cy="43" rx="8.5" ry="27" transform="rotate(13 77 43)"/>
    <!-- head -->
    <ellipse cx="64" cy="82" rx="27" ry="25"/>
  </g>
  <g fill="#2A3350">
    <!-- inner ears (stencil negative space) -->
    <ellipse cx="52" cy="46" rx="3.4" ry="17" transform="rotate(-13 52 46)"/>
    <ellipse cx="76" cy="46" rx="3.4" ry="17" transform="rotate(13 76 46)"/>
    <!-- eyes + nose -->
    <circle cx="55" cy="79" r="3.1"/>
    <circle cx="73" cy="79" r="3.1"/>
    <path d="M64 87.5 l4 4.2 h-8 z"/>
  </g>
</svg>
