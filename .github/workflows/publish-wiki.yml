name: Publish Wiki

# Version-control the GitHub wiki from the main repo: the Markdown lives in wiki/, and this mirrors it to the
# repo's wiki (github.com/<owner>/<repo>.wiki.git) whenever those files change on main. One-time setup: enable
# Wikis in repo settings and create one page via the web UI so the .wiki.git repo exists (see
# wiki/Contributing-to-this-Wiki.md).
#
# No third-party actions: the sync is plain git so there is no unpinned supply-chain surface. Only GitHub's
# own actions/checkout is used. All shell inputs are trusted default env vars (GITHUB_REPOSITORY, GITHUB_SHA)
# or the scoped GITHUB_TOKEN — never event payload data.

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
      - '.github/workflows/publish-wiki.yml'

permissions:
  contents: write

concurrency:
  group: publish-wiki
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync wiki/ to the GitHub wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          work="$(mktemp -d)"
          # GITHUB_REPOSITORY / GITHUB_SHA are trusted default env vars; the token is masked in logs.
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" "$work"
          rsync -a --delete --exclude='.git' wiki/ "$work/"
          cd "$work"
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'wiki already up to date'
            exit 0
          fi
          git commit -m "Sync wiki from ${GITHUB_SHA}"
          git push origin HEAD
