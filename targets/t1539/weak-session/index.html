<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Weak session cookie — demo</title>
    <style>
      body { font: 15px/1.6 system-ui, sans-serif; max-width: 560px; margin: 60px auto; padding: 0 20px; color: #222; }
      .note { background: #fff7ed; border: 1px solid #fed7aa; color: #9a3412; padding: 10px 12px; border-radius: 8px; }
      code { background: #f3eee4; padding: 1px 5px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>Weak session cookie set</h1>
    <p class="note">
      <strong>Benign demo target.</strong> On load, this page set a session cookie <strong>without Secure or
      HttpOnly</strong> — the shape a session vulnerable to theft (T1539) takes. The
      <code>0x13d::att&amp;ck</code> EDR should detect it and remove it. Nothing here is sent anywhere.
    </p>
    <p>Cookie set: <code id="ck"></code></p>
    <script>
      // Not Secure, not HttpOnly (document.cookie can't set HttpOnly) → exposed to theft.
      document.cookie = 'sessionid=demo-' + Date.now() + '; path=/; SameSite=Lax';
      document.getElementById('ck').textContent = document.cookie || '(removed by the EDR)';
    </script>
  </body>
</html>
